<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Game Glitch Investigator Simple System Diagram</title>
  <desc id="desc">Simple flow diagram showing bug report input, retrieval and diagnosis, human review, testing, and output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #cbd5e1; }
      .label { font: 700 18px Arial, sans-serif; fill: #f8fafc; }
      .text { font: 400 14px Arial, sans-serif; fill: #dbeafe; }
      .small { font: 400 13px Arial, sans-serif; fill: #cbd5e1; }
      .box { fill: url(#card); stroke: rgba(255,255,255,0.14); stroke-width: 2; rx: 18; ry: 18; }
      .input { fill: rgba(56,189,248,0.12); stroke: #38bdf8; stroke-width: 2.5; rx: 18; ry: 18; }
      .test { fill: rgba(167,139,250,0.12); stroke: #a78bfa; stroke-width: 2.5; rx: 18; ry: 18; }
      .arrow { stroke: #67e8f9; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .note-arrow { stroke: #a78bfa; stroke-width: 3.5; fill: none; marker-end: url(#arrowhead-purple); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#67e8f9" />
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#a78bfa" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1100" height="520" fill="url(#bg)" />
  <text x="48" y="56" class="title">Game Glitch Investigator</text>
  <text x="48" y="82" class="subtitle">Simple system flow from bug report to diagnosis, with human review and testing</text>

  <rect x="50" y="160" width="210" height="120" class="input" />
  <text x="78" y="198" class="label">Human input</text>
  <text x="78" y="224" class="text">Write a bug report</text>
  <text x="78" y="246" class="text">or click a sample case</text>

  <rect x="320" y="160" width="230" height="120" class="box" />
  <text x="348" y="198" class="label">Retriever + agent</text>
  <text x="348" y="224" class="text">Find similar cases</text>
  <text x="348" y="246" class="text">Explain likely root cause</text>

  <rect x="610" y="160" width="210" height="120" class="box" />
  <text x="638" y="198" class="label">AI output</text>
  <text x="638" y="224" class="text">Diagnosis</text>
  <text x="638" y="246" class="text">Fix + confidence</text>

  <rect x="890" y="160" width="160" height="120" class="test" />
  <text x="915" y="198" class="label">Tester</text>
  <text x="915" y="224" class="text">Pytest</text>
  <text x="915" y="246" class="text">Benchmark cases</text>

  <path d="M260 220 L320 220" class="arrow" />
  <path d="M550 220 L610 220" class="arrow" />
  <path d="M820 220 L890 220" class="arrow" />

  <rect x="320" y="330" width="230" height="90" class="box" />
  <text x="348" y="365" class="label">Human review</text>
  <text x="348" y="391" class="text">Read trace and retrieved cases</text>

  <path d="M725 280 C725 320 550 320 435 330" class="note-arrow" />
  <path d="M435 330 C300 330 260 290 205 280" class="note-arrow" />

  <text x="50" y="470" class="small">Flow: input → retrieve/analyze → diagnosis output, with human checking and automated tests validating results.</text>
</svg>